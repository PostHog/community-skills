name: Validate skills

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml

      # On PRs, validate without writing: --check parses every skill (failing on bad frontmatter,
      # symlinks, oversize/non-text files, etc.) AND fails if the contributor didn't commit a fresh
      # registry.json. Running a mutating build first would regenerate the file and defeat that gate.
      - name: Validate skills and verify committed registry (PRs)
        if: github.event_name == 'pull_request'
        run: python scripts/build_registry.py --check

      # On pushes (e.g. to main), just validate by building; the publish-registry job below commits
      # any regenerated registry.json.
      - name: Validate skills (push)
        if: github.event_name != 'pull_request'
        run: python scripts/build_registry.py

      - name: Safety scan (prompt-injection heuristics)
        run: python scripts/safety_scan.py

  # On main, regenerate and commit registry.json so PostHog's sync sees the latest.
  publish-registry:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - run: pip install pyyaml
      - run: python scripts/build_registry.py
      - name: Commit updated registry
        run: |
          if ! git diff --quiet registry.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add registry.json
            git commit -m "chore: rebuild registry.json"
            git push
          fi
